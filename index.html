<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sermon Catalog</title>
    <link rel="stylesheet" href="shc_sermon_library.css">
    <script src="shc_sermon_data.js"></script>
</head>

<body onload="initializeTabs()">
    <div class="header">https://fredmurrayjr-mysite-1.editor.wix.com/html/editor/web/renderer/edit/fa5efd78-1730-40eb-aec9-fe0b3c812649?metaSiteId=1fa55e0a-efa7-4492-b957-b9dcbd2dd1da
        <h1>📖 Sermon Library</h1>
        <p>Browse sermons by biblical book or theological topic</p>
    </div>

    <div class="container">
        <div class="tab">
            <button class="tablinks" onclick="openFilterType(event, 'byTopic')">Topics</button>
            <button class="tablinks" onclick="openFilterType(event, 'byBook')">Books</button>
        </div>

        <!-- By Topic Tree -->
        <div id="byTopic" class="tree-container tab-content">
            <div class="tree-header">
                <h2>🏷️ By Topic</h2>
            </div>
            <div class="tree" id="topic-tree">
                <!-- Content will be generated by JavaScript -->
            </div>
        </div>

        <!-- Book Filter Section -->
        <div id="byBook" class="filter-section tab-content">
            <div class="tree-header">
                <h2>Filter by Book</h2>
            </div>

            <label for="bookFilter" style="color:white">Select a Book</label>
            <select class="book-dropdown" id="bookFilter" name="bookFilter">
                <option value="">Choose a book...</option>
                <!-- Options will be populated by JavaScript -->
            </select>

            <!-- Filtered Results Container -->
            <div class="filtered-results" id="filteredResults">
                <div class="tree" id="filtered-tree">
                    <!-- Filtered content will appear here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let idCounter = 0;

        function generateUniqueId() {
            return `node-${++idCounter}`;
        }

        function createSermonItem(sermon) {
            const videoNodeId = generateUniqueId();
            return `
                <li class="tree-node">
                    <div class="tree-toggle" data-target="${videoNodeId}">
                        <span class="toggle-icon"></span>
                        <span class="tree-content">
                            <span class="sermon-title">📝 ${sermon.title}</span>
                            <span class="sermon-date">${sermon.date}</span>
                        </span>
                    </div>
                    <ul class="tree-children collapsed" id="${videoNodeId}"
                        data-youtube-id="${sermon.youtube}"
                        data-start-time="${sermon.startTime || 0}"
                        data-video-title="${sermon.title}">
                        <li class="video-container">
                            <div class="video-placeholder">Click to load video...</div>
                        </li>
                    </ul>
                </li>
            `;
        }

        function createTreeNode(title, children, isSermonList = false) {
            const nodeId = generateUniqueId();

            if (isSermonList) {
                const sermonItems = children.map(createSermonItem).join('');
                const count = children.length;
                return `
                    <li class="tree-node">
                        <div class="tree-toggle" data-target="${nodeId}">
                            <span class="toggle-icon"></span>
                            <span class="tree-content">${title} <span class="sermon-count">(${count})</span></span>
                        </div>
                        <ul class="tree-children collapsed" id="${nodeId}">
                            ${sermonItems}
                        </ul>
                    </li>
                `;
            } else {
                const childNodes = Object.entries(children).map(([childTitle, childData]) => {
                    if (Array.isArray(childData)) {
                        return createTreeNode(childTitle, childData, true);
                    } else {
                        return createTreeNode(childTitle, childData, false);
                    }
                }).join('');

                return `
                    <li class="tree-node">
                        <div class="tree-toggle" data-target="${nodeId}">
                            <span class="toggle-icon"></span>
                            <span class="tree-content">${title}</span>
                        </div>
                        <ul class="tree-children collapsed" id="${nodeId}">
                            ${childNodes}
                        </ul>
                    </li>
                `;
            }
        }

        function generateBookData() {
            const bookData = {};

            for (const sermon of sermonData) {
                if (!sermon.bookChapters || !Array.isArray(sermon.bookChapters)) {
                    continue;
                }

                addSermonToBookData(sermon, bookData);
            }
            return bookData;
        }

        function addSermonToBookData(sermon, bookData) {
            for (const bookChapter of sermon.bookChapters) {
                const { book, chapters } = bookChapter;

                if (!bookData[book]) {
                    bookData[book] = {};
                }

                for (const chapter of chapters) {
                    if (!bookData[book][chapter]) {
                        bookData[book][chapter] = [];
                    }

                    if (!bookData[book][chapter].some(s => s.id === sermon.id)) {
                        bookData[book][chapter].push(sermon);
                    }
                }
            }
        }

        function generateBookDropdown() {
            const dropdown = document.getElementById('bookFilter');
            const bookData = generateBookData();
            const availableBooks = Object.keys(bookData);

            // Sort books according to biblical order
            const sortedBooks = bookOrder.filter(book => availableBooks.includes(book));

            for (const book of sortedBooks) {
                const option = document.createElement('option');
                option.value = book;
                option.textContent = book;
                dropdown.appendChild(option);
            }
        }

        function generateFilteredBookTree(selectedBook) {
            const bookData = generateBookData();

            if (!selectedBook || !bookData[selectedBook]) {
                return '';
            }

            const chapters = bookData[selectedBook];
            const chapterTreeHtml = Object.entries(chapters).map(([chapterName, sermons]) => {
                return createTreeNode(chapterName, sermons, true);
            }).join('');

            return `<ul>${chapterTreeHtml}</ul>`;
        }

        // Generate topic-based data from sermon properties
        function generateTopicData() {
            const topicData = {};

            // Iterate through all sermons to collect them by topic
            for (const sermon of sermonData) {
                if (sermon.topics && Array.isArray(sermon.topics)) {
                    for (const topic of sermon.topics) {
                        if (!topicData[topic]) {
                            topicData[topic] = [];
                        }
                        topicData[topic].push(sermon);
                    }
                }
            }

            return topicData;
        }

        function generateTopicTree() {
            const topicData = generateTopicData();
            const sortedTopics = Object.keys(topicData).sort();

            const topicTreeHtml = sortedTopics.map(topic => {
                return createTreeNode(topic, topicData[topic], true);
            }).join('');

            return `<ul>${topicTreeHtml}</ul>`;
        }

        function initializeTrees() {
            // Generate topic tree and populate book dropdown
            document.getElementById('topic-tree').innerHTML = generateTopicTree();
            generateBookDropdown();

            // Add dropdown change listener
            document.getElementById('bookFilter').addEventListener('change', function (e) {
                const selectedBook = e.target.value;
                const filteredResults = document.getElementById('filteredResults');
                const filteredTree = document.getElementById('filtered-tree');

                if (selectedBook) {
                    filteredTree.innerHTML = generateFilteredBookTree(selectedBook);
                    filteredResults.classList.add('active');
                } else {
                    filteredResults.classList.remove('active');
                    filteredTree.innerHTML = '';
                }
            });

            // Add event listeners for toggles
            document.addEventListener('click', function (e) {
                if (e.target.closest('.tree-toggle')) {
                    const toggle = e.target.closest('.tree-toggle');
                    const targetId = toggle.dataset.target;
                    const targetElement = document.getElementById(targetId);
                    const icon = toggle.querySelector('.toggle-icon');

                    if (targetElement.classList.contains('collapsed')) {
                        targetElement.classList.remove('collapsed');
                        targetElement.classList.add('expanded');
                        icon.classList.add('expanded');
                        toggle.classList.add('active');

                        // Load YouTube iframe if this is a video section
                        const youtubeId = targetElement.dataset.youtubeId;
                        if (youtubeId) {
                            loadYouTubeVideo(targetElement, youtubeId);
                        }
                    } else {
                        targetElement.classList.remove('expanded');
                        targetElement.classList.add('collapsed');
                        icon.classList.remove('expanded');
                        toggle.classList.remove('active');

                        // Stop and remove video when collapsing
                        stopAndRemoveVideo(targetElement);

                        // Collapse all children
                        const childToggles = targetElement.querySelectorAll('.tree-toggle');
                        for (const childToggle of childToggles) {
                            const childTargetId = childToggle.dataset.target;
                            const childTargetElement = document.getElementById(childTargetId);
                            const childIcon = childToggle.querySelector('.toggle-icon');

                            childTargetElement.classList.remove('expanded');
                            childTargetElement.classList.add('collapsed');
                            childIcon.classList.remove('expanded');
                            childToggle.classList.remove('active');

                            // Stop and remove videos in collapsed children too
                            stopAndRemoveVideo(childTargetElement);
                        }
                    }
                }

                // Handle video placeholder clicks
                if (e.target.closest('.video-placeholder')) {
                    const placeholder = e.target.closest('.video-placeholder');
                    const container = placeholder.closest('.tree-children');
                    const youtubeId = container.dataset.youtubeId;
                    if (youtubeId) {
                        loadYouTubeVideo(container, youtubeId);
                    }
                }
            });
        }

        function loadYouTubeVideo(container, youtubeId) {
            const videoContainer = container.querySelector('.video-container');
            const placeholder = videoContainer.querySelector('.video-placeholder');

            if (placeholder) {
                const videoTitle = container.dataset.videoTitle || 'Sermon Video';
                const startTime = container.dataset.startTime || '0';

                // Create iframe using DOM methods instead of innerHTML
                const iframe = document.createElement('iframe');
                iframe.width = '560';
                iframe.height = '315';
                // Add start time parameter and enable JS API for control
                iframe.src = `https://www.youtube.com/embed/${youtubeId}?modestbranding=1&rel=0&start=${startTime}&enablejsapi=1`;
                iframe.title = videoTitle;
                iframe.frameBorder = '0';
                iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
                iframe.allowFullscreen = true;
                iframe.id = `youtube-${container.id}`; // Give iframe an ID for control

                // Clear container and add iframe
                videoContainer.innerHTML = '';
                videoContainer.appendChild(iframe);
            }
        }

        function stopAndRemoveVideo(container) {
            const videoContainer = container.querySelector('.video-container');
            if (videoContainer) {
                const iframe = videoContainer.querySelector('iframe');
                if (iframe) {
                    // Stop the video by removing and replacing the iframe to prevent multiple playbacks simultaneously
                    videoContainer.innerHTML = '<div class="video-placeholder">Click to load video...</div>';
                }
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', initializeTrees);

        function initializeTabs() {
            // Show the default tab content
            document.getElementById('byTopic').style.display = 'block';
            // Add active class to the first tab button
            document.getElementsByClassName('tablinks')[0].className += ' active';
        }

        function openFilterType(evt, filterType) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(filterType).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
</body>

</html>
